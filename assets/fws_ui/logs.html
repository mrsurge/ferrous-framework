<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shell Logs - {{ shell_id }}</title>
    <style>
      :root {
        --background: hsl(224, 71%, 4%);
        --foreground: hsl(213, 31%, 91%);
        --border: hsl(216, 34%, 17%);
        --primary: hsl(217, 91%, 60%);
        --card: hsl(224, 71%, 7%);
        --success: hsl(142, 76%, 36%);
        --destructive: hsl(0, 84%, 60%);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--background);
        color: var(--foreground);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      .header {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .header h1 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--primary);
      }
      .header .shell-id {
        font-size: 0.85rem;
        opacity: 0.75;
      }
      .status {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.15);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      .status.disconnected {
        background: rgba(239, 68, 68, 0.15);
        color: var(--destructive);
        border-color: rgba(239, 68, 68, 0.25);
      }
      .logs-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .log-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .log-pane-header {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 8px 16px;
        font-size: 0.9rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .log-pane-header.stdout { color: var(--success); }
      .log-pane-header.stderr { color: var(--destructive); }
      .log-pane-title {
        min-width: 80px;
      }
      .filters {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 100%;
      }
      .filter-row {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
      }
      .filter-input {
        min-width: 0;
        flex: 1;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--foreground);
        padding: 4px 6px;
        font-family: inherit;
        font-size: 0.75rem;
      }
      .filter-input.invalid {
        border-color: var(--destructive);
      }
      .mode {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 0.72rem;
        color: var(--foreground);
      }
      .mode input {
        margin: 0;
      }
      .log-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 0.85rem;
        line-height: 1.5;
        background: var(--background);
        user-select: text;
      }
      .loading {
        color: var(--primary);
        text-align: center;
        padding: 20px;
      }
      .log-pane + .log-pane {
        border-top: 2px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Shell Logs</h1>
        <div class="shell-id">{{ shell_id }}</div>
      </div>
      <div class="status" id="status">Connecting...</div>
    </div>

    <div class="logs-container">
      <div class="log-pane">
        <div class="log-pane-header stdout">
          <div class="log-pane-title">STDOUT</div>
          <div class="filters">
            <div class="filter-row">
              <input id="stdout-include-input" class="filter-input" type="text" placeholder="Include filter" />
              <label class="mode"><input type="radio" name="stdout-include-mode" value="regex" checked />Regex</label>
              <label class="mode"><input type="radio" name="stdout-include-mode" value="exact" />Exact</label>
            </div>
            <div class="filter-row">
              <input id="stdout-exclude-input" class="filter-input" type="text" placeholder="Exclude filter" />
              <label class="mode"><input type="radio" name="stdout-exclude-mode" value="regex" checked />Regex</label>
              <label class="mode"><input type="radio" name="stdout-exclude-mode" value="exact" />Exact</label>
            </div>
          </div>
        </div>
        <pre class="log-content" id="stdout-container"><div class="loading">Connecting...</div></pre>
      </div>

      <div class="log-pane">
        <div class="log-pane-header stderr">
          <div class="log-pane-title">STDERR</div>
          <div class="filters">
            <div class="filter-row">
              <input id="stderr-include-input" class="filter-input" type="text" placeholder="Include filter" />
              <label class="mode"><input type="radio" name="stderr-include-mode" value="regex" checked />Regex</label>
              <label class="mode"><input type="radio" name="stderr-include-mode" value="exact" />Exact</label>
            </div>
            <div class="filter-row">
              <input id="stderr-exclude-input" class="filter-input" type="text" placeholder="Exclude filter" />
              <label class="mode"><input type="radio" name="stderr-exclude-mode" value="regex" checked />Regex</label>
              <label class="mode"><input type="radio" name="stderr-exclude-mode" value="exact" />Exact</label>
            </div>
          </div>
        </div>
        <pre class="log-content" id="stderr-container"><div class="loading">Connecting...</div></pre>
      </div>
    </div>

    <script>
      const shellId = "{{ shell_id }}";
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${proto}//${location.host}/ws/fws/logs/${shellId}`);
      const stdoutContainer = document.getElementById("stdout-container");
      const stderrContainer = document.getElementById("stderr-container");
      const status = document.getElementById("status");
      const rawLog = { stdout: "", stderr: "" };
      let messageBuffer = "";
      let requestCounter = 0;
      let openRequestId = "";

      function nextRequestId() {
        requestCounter += 1;
        return `fws_logs_${requestCounter}`;
      }

      function consumeChunk(chunk) {
        if (typeof chunk !== "string" || chunk.length === 0) {
          return [];
        }
        const combined = messageBuffer + chunk;
        const parts = combined.split("\n");
        messageBuffer = parts.pop() || "";
        return parts.map((line) => line.trim()).filter((line) => line.length > 0);
      }

      function compileMatcher(stream, kind, query, mode) {
        const input = document.getElementById(`${stream}-${kind}-input`);
        if (input) input.classList.remove("invalid");
        if (!query) return () => kind === "include";
        if (mode === "exact") {
          return (line) => line === query;
        }
        try {
          const re = new RegExp(query);
          return (line) => re.test(line);
        } catch (err) {
          if (input) input.classList.add("invalid");
          return () => kind !== "include";
        }
      }

      function getFilterConfig(stream) {
        const includeInput = document.getElementById(`${stream}-include-input`);
        const excludeInput = document.getElementById(`${stream}-exclude-input`);
        const includeMode = document.querySelector(`input[name="${stream}-include-mode"]:checked`);
        const excludeMode = document.querySelector(`input[name="${stream}-exclude-mode"]:checked`);
        return {
          includeQuery: (includeInput && includeInput.value || "").trim(),
          excludeQuery: (excludeInput && excludeInput.value || "").trim(),
          includeMode: includeMode ? includeMode.value : "regex",
          excludeMode: excludeMode ? excludeMode.value : "regex",
        };
      }

      function renderStream(stream) {
        const container = stream === "stdout" ? stdoutContainer : stderrContainer;
        const cfg = getFilterConfig(stream);
        const includeMatch = compileMatcher(stream, "include", cfg.includeQuery, cfg.includeMode);
        const excludeMatch = compileMatcher(stream, "exclude", cfg.excludeQuery, cfg.excludeMode);

        const allLines = (rawLog[stream] || "").split("\n");
        const filtered = [];
        for (const line of allLines) {
          const includeOk = cfg.includeQuery ? includeMatch(line) : true;
          const excludeHit = cfg.excludeQuery ? excludeMatch(line) : false;
          if (includeOk && !excludeHit) filtered.push(line);
        }
        container.textContent = filtered.join("\n");
        container.scrollTop = container.scrollHeight;
      }

      function wireFilters(stream) {
        const includeInput = document.getElementById(`${stream}-include-input`);
        const excludeInput = document.getElementById(`${stream}-exclude-input`);
        const radios = document.querySelectorAll(`input[name="${stream}-include-mode"], input[name="${stream}-exclude-mode"]`);

        let timer = null;
        const apply = () => renderStream(stream);
        const applyDebounced = () => {
          if (timer) clearTimeout(timer);
          timer = setTimeout(apply, 200);
        };

        includeInput.addEventListener("input", applyDebounced);
        excludeInput.addEventListener("input", applyDebounced);
        includeInput.addEventListener("keydown", (ev) => { if (ev.key === "Enter") apply(); });
        excludeInput.addEventListener("keydown", (ev) => { if (ev.key === "Enter") apply(); });
        radios.forEach((r) => r.addEventListener("change", apply));
      }

      wireFilters("stdout");
      wireFilters("stderr");

      ws.onopen = () => {
        status.textContent = "Connecting...";
        status.classList.add("disconnected");
        openRequestId = nextRequestId();
        ws.send(JSON.stringify({
          jsonrpc: "2.0",
          id: openRequestId,
          method: "fws.logs.open",
          params: { shell_id: shellId },
        }) + "\n");
      };

      ws.onmessage = (e) => {
        for (const line of consumeChunk(e.data)) {
          try {
            const msg = JSON.parse(line);
            if (!msg || msg.jsonrpc !== "2.0" || typeof msg !== "object") {
              continue;
            }
            if (typeof msg.id === "string") {
              if (msg.id === openRequestId && msg.result && msg.result.accepted === true) {
                status.textContent = "Connected";
                status.classList.remove("disconnected");
              } else if (msg.id === openRequestId && msg.error && typeof msg.error.message === "string") {
                stdoutContainer.textContent = msg.error.message;
                stderrContainer.textContent = msg.error.message;
                status.textContent = "Error";
                status.classList.add("disconnected");
              }
              continue;
            }
            if (typeof msg.method !== "string" || !msg.params || typeof msg.params !== "object") {
              continue;
            }

            if (msg.method === "fws.logs.initial") {
              rawLog.stdout = msg.params.stdout || "";
              rawLog.stderr = msg.params.stderr || "";
              renderStream("stdout");
              renderStream("stderr");
            } else if (msg.method === "fws.logs.reset") {
              if (msg.params.stream === "stdout") {
                rawLog.stdout = "";
                renderStream("stdout");
              } else if (msg.params.stream === "stderr") {
                rawLog.stderr = "";
                renderStream("stderr");
              }
            } else if (msg.method === "fws.logs.chunk") {
              if (msg.params.stream === "stdout") {
                rawLog.stdout += msg.params.chunk || "";
                renderStream("stdout");
              } else if (msg.params.stream === "stderr") {
                rawLog.stderr += msg.params.chunk || "";
                renderStream("stderr");
              }
            } else if (msg.method === "fws.error") {
              stdoutContainer.textContent = msg.params.message || "Error";
              stderrContainer.textContent = msg.params.message || "Error";
            }
          } catch (err) {
            // ignore
          }
        }
      };

      ws.onerror = () => {
        status.textContent = "Error";
        status.classList.add("disconnected");
      };

      ws.onclose = () => {
        stdoutContainer.textContent += "\n\n[Connection closed]";
        stderrContainer.textContent += "\n\n[Connection closed]";
        status.textContent = "Disconnected";
        status.classList.add("disconnected");
      };
    </script>
  </body>
</html>
