[package]
name = "ferrous_framework"
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/mrsurge/ferrous-framework"
rust-version = "1.93"
description = "Rust adapter and runtime path for framework-shells-compatible process management"

[features]
default = []
pyo3-embed = ["dep:pyo3"]

[dependencies]
anyhow = "1"
pyo3 = { version = "0.27", features = ["abi3-py311"], optional = true }
